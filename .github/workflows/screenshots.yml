name: Flutter Web Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release

      - name: Install screenshot tools
        run: |
          npm init -y
          npm install -D http-server playwright
          npx playwright install chromium

      - name: Serve app and take screenshots
        run: |
          npx http-server build/web -p 8080 &
          sleep 5
          node - <<'JS'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            fs.mkdirSync('screenshots', { recursive: true });

            const browser = await chromium.launch();
            const page = await browser.newPage();

            async function captureRoute(name, route, width = 390, height = 844) {
              await page.setViewportSize({ width, height });
              await page.goto(`http://127.0.0.1:8080/#${route}`, { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(3500);
              await page.screenshot({ path: `screenshots/${name}.png`, fullPage: true });
            }

            async function captureHomeTab(name, tabIndex) {
              await page.setViewportSize({ width: 390, height: 844 });
              await page.goto('http://127.0.0.1:8080/#/home', { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(3500);

              if (tabIndex > 0) {
                const tabWidth = 390 / 5;
                await page.mouse.click((tabIndex + 0.5) * tabWidth, 810);
                await page.waitForTimeout(1500);
              }

              await page.screenshot({ path: `screenshots/${name}.png`, fullPage: true });
            }

            await captureRoute('01-login-mobile', '/login');
            await captureRoute('02-signup-mobile', '/signup');
            await captureHomeTab('03-dashboard-mobile', 0);
            await captureHomeTab('04-income-mobile', 1);
            await captureHomeTab('05-expenses-mobile', 2);
            await captureHomeTab('06-budgets-mobile', 3);
            await captureHomeTab('07-savings-mobile', 4);
            await captureRoute('08-notifications-mobile', '/notifications');
            await captureRoute('09-add-income-mobile', '/income/form');
            await captureRoute('10-add-expense-mobile', '/expense/form');
            await captureRoute('11-add-budget-mobile', '/budget/form');
            await captureRoute('12-add-savings-mobile', '/savings/form');

            await captureRoute('13-dashboard-desktop', '/home', 1440, 900);
            await captureRoute('14-login-desktop', '/login', 1440, 900);

            await browser.close();
          })();
          JS

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: flutter-screenshots
          path: screenshots
