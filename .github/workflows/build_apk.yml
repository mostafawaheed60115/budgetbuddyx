name: Build Flutter Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get > pub_get.log 2>&1 || {
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add pub_get.log
            git commit -m "ci: save pub get error log [skip ci]" || true
            git push origin main || true
            exit 1
          }

      - name: Build APK
        run: |
          flutter build apk --release > build_apk.log 2>&1 || {
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add build_apk.log
            git commit -m "ci: save build apk error log [skip ci]" || true
            git push origin main || true
            exit 1
          }

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-buddy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
