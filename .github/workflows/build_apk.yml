name: Build Flutter Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          # Try removing pubspec.lock to resolve version conflicts with the runner's Flutter SDK
          rm -f pubspec.lock
          flutter pub get > pub_get.log 2>&1 || {
            curl -X POST --data-binary @pub_get.log http://budgetbuddy.nova-solution.net/log || true
            exit 1
          }

      - name: Build APK
        run: |
          flutter build apk --release > build_apk.log 2>&1 || {
            curl -X POST --data-binary @build_apk.log http://budgetbuddy.nova-solution.net/log || true
            exit 1
          }

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-buddy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
